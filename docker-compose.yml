services:
  mysql:
    image: mysql:8.4
    container_name: ecommerce-mysql
    environment:
      MYSQL_DATABASE: ${DB_NAME:-ecommerce_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: ecommerce-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-ecommerce_db}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-VGhpc0lzQVN1cGVyU2VjdXJlSldUU2VjcmV0S2V5Rm9yRWNvbW1lcmNlQXBwbGljYXRpb24xMjM0NTY=}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
      SQL_INIT_MODE: ${SQL_INIT_MODE:-always}
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: ecommerce-frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
